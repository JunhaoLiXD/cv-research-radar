name: Daily CV Research Radar

on:
  workflow_dispatch:
  schedule:
    # 00:00 UTC is 08:00 Asia/Singapore year-round.
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: daily-cv-research-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Singapore
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Test
        run: python -m pytest

      - name: Generate daily report
        run: python -m cv_radar run

      - name: Commit changed state only
        shell: bash
        run: |
          if git diff --quiet -- state && [ -z "$(git status --porcelain -- state)" ]; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state
          if git diff --cached --quiet; then
            echo "No staged state changes."
            exit 0
          fi
          git commit -m "chore: update daily research radar"
          git push
